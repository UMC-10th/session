<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YONG TODO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>YONG TODO</h1>
    <div class="input-area">
      <input type="text" id="todo-input" placeholder="할 일 입력" />
      <button id="add-btn">할 일 추가</button>
    </div>
    <div class="todo-section">
      <div class="column">
        <h2>할 일</h2>
        <ul id="todo-list"></ul>
      </div>
      <div class="column">
        <h2>완료</h2>
        <ul id="done-list"></ul>
      </div>
    </div>
  </div>
  <script src="dist/index.js"></script>
</body>
</html>
